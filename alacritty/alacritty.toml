[font]
size = 12.0

[font.normal]
family = "BitstreamVeraSansMono Nerd Font"
style = "Regular"

[font.bold]
family = "BitstreamVeraSansMono Nerd Font"
style = "Bold"

[window]
padding = { x = 8, y = 8 }
opacity = 0.95

[scrolling]
history = 10000

# Dracula theme
[colors.primary]
background = "#282a36"
foreground = "#f8f8f2"

[colors.normal]
black   = "#21222c"
red     = "#ff5555"
green   = "#50fa7b"
yellow  = "#f1fa8c"
blue    = "#bd93f9"
magenta = "#ff79c6"
cyan    = "#8be9fd"
white   = "#f8f8f2"

[colors.bright]
black   = "#6272a4"
red     = "#ff6e6e"
green   = "#69ff94"
yellow  = "#ffffa5"
blue    = "#d6acff"
magenta = "#ff92df"
cyan    = "#a4ffff"
white   = "#ffffff"
